services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  meilisearch:
    image: getmeili/meilisearch:v1.11
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-masterKey}
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_API_KEY: ${MEILI_MASTER_KEY:-masterKey}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-30d}
      PORT: 3001
      CORS_ORIGIN: http://localhost:3000
      ADMIN_KEY: ${ADMIN_KEY:-change-me-secret-admin-key}
    depends_on:
      - redis
      - meilisearch
    ports:
      - "3001:3001"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      # Vite proxy will forward /auth and /api to api:3001
      VITE_API_PROXY_TARGET: http://api:3001
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  redis_data:
  meili_data:

